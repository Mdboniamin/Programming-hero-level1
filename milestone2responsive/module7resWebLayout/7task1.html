<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            gap: 10px;
        }
        p{
            border: 2px solid gray;
            display: flex;
            height: 10em;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 30px;
        }
        .l{
            width: 30%;
            background-color: thistle;
        }
        .r{
            width: 70%;
            background-color: antiquewhite;
        }
        @media screen and (max-width: 576px) {
            .container{
                flex-direction: column;
                gap: 0px;
                column-gap: 0px;
            }
            .l{
                width: 100%;
                height: 5em;
            }
            .r{
                width: 100%;
                height: 10em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="l">Left</p>
        <p class="r">Right</p>
    </div>
</body>
</html>
