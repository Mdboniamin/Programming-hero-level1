<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z_axis</title>
    <style>
        img{
            width: 200px;
        }
        .box{
            position: relative;
        }
        .boy{
            z-index: 10;
        }

        .ring{
            top: -70px;
            z-index: 5;
        }
        .water{
            top: -150px;
        }
    </style>
</head>
<body>
    <h3>Z index</h3>
    <div class="swim-container">
        <div class="box boy"><img src="images/boy.jpg" alt=""></div>
        <div class="box ring"><img src="images/ring.jpg" alt=""></div>
        <div class="box water"><img src="images/water.jpg" alt=""></div>
    </div>
</body>
</html>
