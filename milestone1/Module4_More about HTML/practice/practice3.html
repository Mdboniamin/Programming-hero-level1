<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            border-collapse: collapse;
            
        }
        td,
        th {
            border: 3px double black;
            padding: 5px 10px;
        }
        thead{
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Table Tennis Tournament</h1>
    <table>
        <caption>Tournament Schedule and Results</caption>
        <thead>
            <td>Round 1</td>
            <td>Player A</td>
            <td>Player B</td>
        </thead>
        <tr>
            <td>Match 1</td>
            <td>John</td>
            <td>Alice</td>
        </tr>
        <tr>
            <td>Match 2</td>
            <td>Mark</td>
            <td>Sarah</td>
        </tr>
        <thead>
            <td>Round 2</td>
            <td>Player C</td>
            <td>Player D</td>
        </thead>
        <tr>
            <td>Match 3</td>
            <td>TBD</td>
            <td>TBD</td>
        </tr>
        <tr>
            <td>Match 4</td>
            <td>TBD</td>
            <td>TBD</td>
        </tr>
        <Thead>
            <td>Final</td>
            <td>Winner of Match 3</td>
            <td>Winner of Match 4</td>
        </Thead>
        <tr>
            <td>Champion</td>
            <td>TBD</td>
            <td>TBD</td>
        </tr>
    </table>
</body>
</html>
